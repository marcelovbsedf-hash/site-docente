<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formação Docente</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  background: #f4f6f8;
  transition: 0.3s;
}

.dark {
  background: #1e1e1e;
  color: white;
}

/* MENU */
.sidebar {
  width: 260px;
  background: #2c3e50;
  color: white;
  height: 100vh;
  position: fixed;
  padding: 20px;
}

.sidebar a {
  display: block;
  color: white;
  margin: 10px 0;
  text-decoration: none;
}

/* CONTEÚDO */
.main {
  margin-left: 260px;
  padding: 20px;
  width: 100%;
}

header {
  text-align: center;
}

input {
  width: 80%;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}

/* CARDS */
.card {
  background: white;
  padding: 20px;
  margin: 20px 0;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.dark .card {
  background: #2a2a2a;
}

iframe {
  width: 100%;
  height: 300px;
  margin-top: 10px;
  border-radius: 10px;
}

/* ANIMAÇÃO */
.card:hover {
  transform: scale(1.02);
}

/* MOBILE */
@media (max-width: 800px) {
  .sidebar {
    display: none;
  }
  .main {
    margin-left: 0;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Menu</h2>
  <a href="#sec1">Seção 1</a>
  <a href="#sec2">Seção 2</a>
  <a href="#sec3">Seção 3</a>
  <a href="#adapt">Adaptações</a>
  <a href="#temas">Temas</a>
</div>

<div class="main">

<header>
  <h1>Formação Docente</h1>
  <p>Transtornos do Neurodesenvolvimento</p>

  <input type="text" id="busca" placeholder="🔎 Buscar..." onkeyup="buscar()">
  <br>
  <button onclick="modoEscuro()">🌙 Modo escuro</button>
</header>

<div class="card" id="sec1">
  <h2>Seção 1</h2>
  <p>Assuntos essenciais</p>
  <iframe src="https://www.youtube.com/embed/dqTTojTija8"></iframe>
  <iframe src="https://www.youtube.com/embed/kQjtK32mGJQ"></iframe>
</div>

<div class="card" id="sec2">
  <h2>Seção 2</h2>
  <p>Preparação docente</p>
</div>

<div class="card" id="sec3">
  <h2>Seção 3</h2>
  <p>Dificuldades enfrentadas</p>
  <iframe src="https://www.youtube.com/embed/aPknwW8mPAM"></iframe>
</div>

<div class="card" id="adapt">
  <h2>Adaptações</h2>
  <ul>
    <li>TDAH</li>
    <li>TEA</li>
    <li>Deficiência Intelectual</li>
    <li>Dislexia</li>
  </ul>
</div>

<div class="card" id="temas">
  <h2>Temas</h2>
  <iframe src="https://www.youtube.com/embed/I0e3t9S-64c"></iframe>
</div>

</div>

<script>
function buscar() {
  let input = document.getElementById("busca").value.toLowerCase();
  let cards = document.getElementsByClassName("card");

  for (let i = 0; i < cards.length; i++) {
    let texto = cards[i].innerText.toLowerCase();

    cards[i].style.display = texto.includes(input) ? "block" : "none";
  }
}

function modoEscuro() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
